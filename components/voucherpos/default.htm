<div class="voucher-pos">
    <style>
        /* The till is a full-page staff tool, so opt the page into OS dark mode
           (the page background follows the OS theme, not just the form fields). */
        :root { color-scheme: light dark; }
        .voucher-pos {
            /* Light theme (default). */
            --pos-fg: #1a3a5a; --pos-text: #1f2937; --pos-muted: #64748b;
            --pos-border: #cbd5e1; --pos-card-bg: transparent; --pos-input-bg: #ffffff;
            --pos-accent: #1a3a5a; --pos-accent-text: #ffffff; --pos-secondary-bg: #e2e8f0;
            --pos-error-bg: #fef2f2; --pos-error-fg: #b91c1c; --pos-warn-bg: #fffbeb;
            --pos-ok-bg: #ecfdf5;
            color-scheme: light dark;
            max-width: 600px; margin: 0 auto; font-size: 18px; line-height: 1.4; color: var(--pos-text);
        }
        @media (prefers-color-scheme: dark) {
            .voucher-pos {
                --pos-fg: #93c5fd; --pos-text: #e5e7eb; --pos-muted: #94a3b8;
                --pos-border: #475569; --pos-card-bg: #1e293b; --pos-input-bg: #0f172a;
                --pos-accent: #2563eb; --pos-accent-text: #ffffff; --pos-secondary-bg: #334155;
                --pos-error-bg: #3f1d1d; --pos-error-fg: #fca5a5; --pos-warn-bg: #3a2f10;
                --pos-ok-bg: #10241a;
            }
        }
        .voucher-pos input, .voucher-pos select, .voucher-pos button { font-size: 18px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--pos-border); box-sizing: border-box; background: var(--pos-input-bg); color: var(--pos-text); }
        .voucher-pos button { background: var(--pos-accent); color: var(--pos-accent-text); border: 0; cursor: pointer; font-weight: 600; }
        .voucher-pos button#posScanBtn { background: var(--pos-secondary-bg); color: var(--pos-fg); }
        .voucher-pos .pos-search { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
        .voucher-pos .pos-search input[name="q"] { flex: 1 1 240px; }
        .voucher-pos .pos-voucher { border: 2px solid var(--pos-fg); border-radius: 14px; padding: 22px; margin: 14px 0; text-align: center; background: var(--pos-card-bg); }
        .voucher-pos .pos-code { font-size: 20px; letter-spacing: 2px; color: var(--pos-muted); }
        .voucher-pos .pos-balance { font-size: 52px; font-weight: 800; color: var(--pos-fg); margin: 8px 0; }
        .voucher-pos .pos-meta { color: var(--pos-muted); font-size: 15px; margin-bottom: 14px; }
        .voucher-pos .pos-redeem { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .voucher-pos .pos-redeem input { flex: 0 1 180px; text-align: right; }
        .voucher-pos .pos-error { color: var(--pos-error-fg); background: var(--pos-error-bg); padding: 16px; border-radius: 10px; text-align: center; }
        .voucher-pos .pos-note { color: var(--pos-muted); }
        .voucher-pos .pos-denied { background: var(--pos-warn-bg); padding: 22px; border-radius: 10px; }
        .voucher-pos .pos-sell-wrap { margin-top: 28px; border-top: 1px solid var(--pos-border); padding-top: 12px; }
        .voucher-pos .pos-sell-wrap summary { cursor: pointer; font-weight: 600; color: var(--pos-fg); padding: 8px 0; }
        .voucher-pos .pos-sell { display: grid; gap: 10px; margin-top: 14px; }
        .voucher-pos .pos-sold { margin-top: 14px; background: var(--pos-ok-bg); padding: 14px; border-radius: 10px; }
        .voucher-pos #posReader { margin: 14px auto; }
    </style>
    {% if not __SELF__.authorized %}
        <div class="pos-denied">
            <p>Diese Seite ist dem Personal vorbehalten. Bitte zuerst im <a href="/backend">Backend</a> anmelden.</p>
        </div>
    {% else %}
        <form class="pos-search" data-request="{{ __SELF__ }}::onLookup" autocomplete="off">
            <input type="text" name="q" id="posQuery" value="{{ __SELF__.initialQuery }}" placeholder="Code z. B. MAM-100042-K" autofocus>
            <button type="submit">Suchen</button>
            <button type="button" id="posScanBtn">QR scannen</button>
        </form>
        <div id="posReader" style="max-width:320px;display:none;"></div>

        <div id="posResult"></div>

        <details class="pos-sell-wrap">
            <summary>Vor-Ort-Verkauf</summary>
            <form class="pos-sell" data-request="{{ __SELF__ }}::onSell" data-request-flash>
                <input type="number" name="value_euro" step="0.01" min="0.01" inputmode="decimal" placeholder="Wert €" required>
                <select name="type" id="posSellType">
                    <option value="physical">Physische Karte</option>
                    <option value="digital">Digital (PDF/QR)</option>
                </select>
                <input type="email" name="email" id="posSellEmail" placeholder="E-Mail (für digital erforderlich)" style="display:none;">
                <select name="payment_method">
                    {% for key, label in __SELF__.paymentMethods %}<option value="{{ key }}">{{ label }}</option>{% endfor %}
                </select>
                <input type="number" name="number" id="posSellNumber" placeholder="Nr. der vorgedruckten Karte (sonst leer = automatisch)">
                <input type="text" name="recipient_name" placeholder="Empfänger (optional)">
                <button type="submit">Verkaufen</button>
            </form>
            <div id="posSold"></div>
        </details>

        <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
            integrity="sha384-c9d8RFSL+u3exBOJ4Yp3HUJXS4znl9f+z66d1y54ig+ea249SpqR+w1wyvXz/lk+"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>
        <script>
        (function () {
            var root = document.currentScript.closest('.voucher-pos');
            var input = root.querySelector('#posQuery');
            var scanBtn = root.querySelector('#posScanBtn');
            var reader = root.querySelector('#posReader');
            var scanner = null;

            function lookup() {
                var submit = root.querySelector('.pos-search [type="submit"]');
                if (submit) submit.click();
            }
            function stopScan() {
                if (scanner) { try { scanner.clear(); } catch (e) {} scanner = null; }
                reader.style.display = 'none';
            }
            if (scanBtn) scanBtn.addEventListener('click', function () {
                if (scanner) { stopScan(); return; }
                if (!window.Html5QrcodeScanner) { alert('QR-Scanner lädt noch – bitte erneut tippen.'); return; }
                reader.style.display = 'block';
                scanner = new Html5QrcodeScanner('posReader', { fps: 10, qrbox: 240 }, false);
                scanner.render(function (decoded) {
                    input.value = decoded;
                    stopScan();
                    lookup();
                });
            });

            // Digital sale needs an email; physical does not.
            var sellType = root.querySelector('#posSellType');
            var sellEmail = root.querySelector('#posSellEmail');
            var sellNumber = root.querySelector('#posSellNumber');
            function syncSellType() {
                var digital = sellType && sellType.value === 'digital';
                if (sellEmail) {
                    sellEmail.style.display = digital ? '' : 'none';
                    sellEmail.required = !!digital;
                    if (!digital) { sellEmail.value = ''; }
                }
                if (sellNumber) {
                    // The number is the pre-printed card number — only for physical.
                    sellNumber.style.display = digital ? 'none' : '';
                    if (digital) { sellNumber.value = ''; }
                }
            }
            if (sellType) { sellType.addEventListener('change', syncSellType); syncSellType(); }

            if (input.value) { lookup(); } // arrived from a scanned QR (?t=…)
        })();
        </script>
    {% endif %}
</div>
