1.0.0:
    - "JumpLink Vouchers – Erstinstallation: Bestellungen, Gutscheine, Einlösungen."
    - create_voucher_orders_table.php
    - create_vouchers_table.php
    - create_redemptions_table.php
1.0.1:
    - "Sicherheit: pro-Bestellung Access-Token für die Rückkehrseite (verhindert IDOR)."
    - add_access_token_to_voucher_orders.php
1.0.2:
    - "Versand: Versanddatum für physische Gutscheine + Versandbenachrichtigung."
    - add_shipping_to_voucher_orders.php
1.0.3:
    - "Zahlung: Zahlungsstatus/-art für manuell angelegte Gutscheine (z. B. an der Kasse bezahlt)."
    - add_payment_to_vouchers.php
1.0.4:
    - "Adresse: optionale Versandadresse für manuell/an der Kasse angelegte Gutscheine (Telefonbestellung mit Versand)."
    - add_address_to_vouchers.php
1.0.5:
    - "Dev/Ops: Command jumplink:vouchers-check-payment (Webhook manuell/lokal auslösen) + webhookUrl nur bei öffentlicher APP_URL setzen (lokaler Mollie-Test ohne Tunnel)."
1.0.6:
    - "UX: Rückkehrseite pollt den Status client-seitig (kein Hard-Reload) via api/jumplink/vouchers/order-status."
1.0.7:
    - "Lieferung: Gutschein als PNG-Bild statt PDF (universell öffenbar, GD-gerendert); PDF bleibt als Fallback."
1.0.8:
    - "i18n: Plugin vollständig zweisprachig (Deutsch + Englisch) — Status, Felder, Einstellungen, Mails, Kassen-/Kauf-UI und Meldungen folgen jetzt der App-Locale."
1.0.9:
    - "i18n: Backend-Listenspalten zeigen übersetzte Labels statt Roh-Codes (Status, Typ, Versand, Zahlung, Einlöseart/-quelle) über *_label-Accessoren; neue Sprachgruppe order_payment_status für die rohen Mollie-Status (open/pending/… inkl. canceled mit einem l) und redemption_source."
1.0.10:
    - "Backend: Gutschein-Bild jedes bestehenden Gutscheins direkt im Backend ansehen/herunterladen (Tab „Gutschein-Bild“ mit Vorschau) — neue auth-geschützte Aktion Vouchers::image, ohne öffentlichen Signatur-Link."
1.0.11:
    - "Gutschein-Bild im Hochformat (smartphone-freundlich) statt quer; zentriertes Layout."
    - "Standard-Gültigkeit auf 0 (kein Ablaufdatum) — die alte 3-Jahres-Voreinstellung wird einmalig auf 0 zurückgesetzt, individuelle Werte bleiben erhalten."
    - reset_default_validity_to_none.php
1.0.12:
    - "i18n: Kauf-Formular-Validierung nutzt lokalisierte Feldnamen (z. B. „E-Mail wird benötigt.“ statt „email …“) — übersetzte Attributnamen für firstname/lastname/email/phone/street/zip/city."
1.0.13:
    - "Fix: Einlösungs-Backend-Formular stürzte ab (HTTP 500, „Array to string conversion“), wenn eine Zeile eine MwSt-Aufteilung trug — das jsonable-Array wurde direkt in ein Textfeld gerendert. Das Formular zeigt die Aufteilung jetzt schreibgeschützt und lesbar formatiert (vat_breakdown_text-Accessor)."
1.0.14:
    - "Sicherheit (Produktionsreife): genau ein Gutschein pro bezahlter Bestellung — Ausgabe ist jetzt idempotent über „existiert bereits ein Gutschein“ statt nur über den Status, plus eindeutiger Index auf vouchers.order_id als DB-Schutz."
    - "Sicherheit: Webhook prüft den bezahlten Betrag gegen die Bestellsumme und findet die Bestellung ausschließlich über die gespeicherte payment_id (kein Vertrauen in Mollie-Metadaten)."
    - "Sicherheit: Rate-Limit pro IP auf dem Kauf-Handler (20/min) und Throttle auf allen öffentlichen API-Routen (Webhook, Status, PDF/Bild, Scan)."
    - "Sicherheit/Datenschutz: order-status pollt jetzt per POST (Access-Token nicht mehr in URL/Logs); signierte Download-Links 7 statt 30 Tage gültig."
    - "DSGVO: konfigurierbare IP-Speicherdauer (ip_retention_days, Default 90) + täglich geplanter Befehl jumplink:vouchers-prune-ips, der alte Käufer-IPs löscht."
    - "Härtung: dompdf ohne Remote-/PHP-Ausführung, CSPRNG-Nonce an der Kasse, keine roh durchgereichten Exceptions, Boot-Warnung bei fehlendem VOUCHER_TOKEN_SECRET, neuer Befehl jumplink:vouchers-production-check (Go-Live-Checkliste)."
    - add_unique_order_id_to_vouchers.php
1.0.15:
    - "Kasse: nicht autorisierte Zugriffe auf die Kassen-Handler (Lookup/Einlösen/Verkauf) liefern jetzt sauber HTTP 403 statt 500 — saubereres Monitoring, gleiche Meldung an der Kasse."
1.0.16:
    - "Sicherheit: Käufer-Freitext (Gruß, Nachricht, Name, Adresse) in der Restaurant-Benachrichtigungsmail wird neutralisiert (HTML entfernt, Markdown-Links und Auto-Links unschädlich gemacht) — kein Einschleusen klickbarer Phishing-Links mehr in den Posteingang des Restaurants."
1.0.17:
    - "Vereinfachung: MwSt-Aufteilung (vat_breakdown) aus dem Einlöse-Ledger entfernt — sie wurde nie erfasst. Die USt bei Einlösung eines Mehrzweckgutscheins bucht die (TSE-)Kasse des Restaurants, der Gutschein ist nur Zahlungsmittel; das Ledger führt nur noch den Saldo."
    - "Backend: Der Bestellungen-Zähler erfasst jetzt auch Überweisungen, die auf Zahlungseingang warten (nicht nur zu versendende Karten) — offene Vorgänge (Zahlung bestätigen / versenden) auf einen Blick."
    - "Aufräumen: ungenutzte Einstellungen entfernt (vat_rates „wählbare Sätze bei Einlösung“ und mollie_mode — der Mollie-Key kommt aus der .env), tote Übersetzungs-Keys und das nicht mehr verdrahtete Feld pdf_generated_at; Cent-Parser (toCents), Einlöse-Fehlertexte und Betrags-Vorschläge an je einer Stelle zusammengeführt; Hinweis zum Hintergrundbild auf Hochformat korrigiert."
    - drop_vat_breakdown_from_redemptions.php
1.0.18:
    - "Beleg: Käufer erhält zu jedem Online-Kauf einen Kaufbeleg als PDF — beim Mehrzweckgutschein bewusst ohne USt-Ausweis und mit dem Hinweis nach § 3 Abs. 15 UStG (USt entsteht erst bei Einlösung), beim Einzweckgutschein mit Netto-/USt-/Brutto-Aufteilung. Verkäufer-Identität (Firma, Anschrift, Steuernr./USt-IdNr.) neu unter Einstellungen → Beleg; Beleg-Nr. = GS-<Bestellnr.>."
    - "Buchhaltung: optionale automatische Belegkopie per E-Mail (Einstellung „Belegkopie an“) als neutrale Mail mit dem Beleg-PDF im Anhang — für DATEV-Belegtransfer, Steuerberater oder Paperless."
    - "Go-Live: production-check warnt, wenn Belege aktiviert sind, aber die Verkäufer-Identität fehlt."
    - "Hinweis: Klassifizierung (Mehr-/Einzweckgutschein), Belegwortlaut und USt-Behandlung der Versandpauschale sind final mit dem Steuerberater abzustimmen."
1.0.19:
    - "Buchhaltung: DATEV-Format-Export (Buchungsstapel EXTF v700) der Gutschein-Verkäufe — Button „DATEV-Export“ in den Bestellungen + Befehl jumplink:vouchers-datev-export. Betreiber-/banken-neutral: Beleg = Geldkonto (Soll) an Gutschein-Verbindlichkeit (Haben), ohne USt (Mehrzweckgutschein); Konten/Berater-/Mandantennummer in Einstellungen → Beleg → DATEV (mit dem Steuerberater abzustimmen)."
    - "DSGVO: Bestellungen anonymisieren (Art. 17) — Backend-Aktion „Anonymisieren“ (Mehrfachauswahl) entfernt Name/E-Mail/Adresse, behält fiskalische Felder; neuer Befehl jumplink:vouchers-anonymize-orders + Einstellung „Personendaten anonymisieren nach (Tagen)“ (täglich geplant, Default aus)."
    - add_anonymized_at_to_voucher_orders.php
1.0.20:
    - "Schnellauswahl: optionale Bezeichnung je vorgeschlagenem Betrag (z. B. ein fester Menüpreis) — erscheint über dem Betrag auf der Kauf- und Kassen-Schnellauswahl. Rein optional; Beträge ohne Bezeichnung bleiben unverändert."
1.0.21:
    - "Fix: Backend-Einlösung schlug fehl (Call to undefined method AuthManager::userHasAccess). Die Berechtigungsprüfung im Einlöse-Handler läuft jetzt über den Backend-Benutzer (hasAccess) statt fälschlich über den AuthManager."
1.0.22:
    - "Text: Beispiel-Zahlmethoden bei der Online-Zahlung auf gängige aktive Methoden umgestellt (Karte, Klarna u. a.) statt PayPal — passt zu typischen Mollie-Profilen. Welche Methoden tatsächlich erscheinen, bestimmt das Mollie-Profil."
1.0.23:
    - "Nummerierung: Startnummer wirkt jetzt als Untergrenze — die nächste automatische Gutscheinnummer ist das Maximum aus zuletzt-vergeben+1 und der Startnummer. Damit lässt sich die Sequenz nach vorn springen (neuer Bereich), während sie nie auf eine bereits vergebene Nummer zurückfällt. Eine niedrigere Startnummer greift weiterhin nur, solange noch kein höher nummerierter Gutschein existiert."
1.0.24:
    - "USt: Die Versandkostenpauschale ist immer mit 19 % USt zu versteuern (eigene Leistung), die USt ist im Preis enthalten — unabhängig davon, dass der Gutscheinwert ein Mehrzweckgutschein ohne USt beim Verkauf bleibt. Der Kaufbeleg weist die 19 % USt auf den Versand jetzt separat aus (netto/USt), auch bei Mehrzweckgutscheinen. Neue DATEV-Einstellungen (Erlöskonto Versand 19 % + BU-Schlüssel) buchen den Versand bei Bedarf auf eine eigene versteuerte Zeile; ohne Konto bleibt das Verhalten wie bisher."
