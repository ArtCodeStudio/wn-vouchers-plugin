    - create_voucher_orders_table.php
    - create_vouchers_table.php
    - create_redemptions_table.php
1.0.1:
    - "Sicherheit: pro-Bestellung Access-Token für die Rückkehrseite (verhindert IDOR)."
    - add_access_token_to_voucher_orders.php
1.0.2:
    - "Versand: Versanddatum für physische Gutscheine + Versandbenachrichtigung."
    - add_shipping_to_voucher_orders.php
1.0.3:
    - "Zahlung: Zahlungsstatus/-art für manuell angelegte Gutscheine (z. B. an der Kasse bezahlt)."
    - add_payment_to_vouchers.php
1.0.4:
    - "Adresse: optionale Versandadresse für manuell/an der Kasse angelegte Gutscheine (Telefonbestellung mit Versand)."
    - add_address_to_vouchers.php
1.0.5:
    - "Dev/Ops: Command jumplink:vouchers-check-payment (Webhook manuell/lokal auslösen) + webhookUrl nur bei öffentlicher APP_URL setzen (lokaler Mollie-Test ohne Tunnel)."
1.0.6:
    - "UX: Rückkehrseite pollt den Status client-seitig (kein Hard-Reload) via api/jumplink/vouchers/order-status."
1.0.7:
    - "Lieferung: Gutschein als PNG-Bild statt PDF (universell öffenbar, GD-gerendert); PDF bleibt als Fallback."
1.0.8:
    - "i18n: Plugin vollständig zweisprachig (Deutsch + Englisch) — Status, Felder, Einstellungen, Mails, Kassen-/Kauf-UI und Meldungen folgen jetzt der App-Locale."
1.0.9:
    - "i18n: Backend-Listenspalten zeigen übersetzte Labels statt Roh-Codes (Status, Typ, Versand, Zahlung, Einlöseart/-quelle) über *_label-Accessoren; neue Sprachgruppe order_payment_status für die rohen Mollie-Status (open/pending/… inkl. canceled mit einem l) und redemption_source."
1.0.10:
    - "Backend: Gutschein-Bild jedes bestehenden Gutscheins direkt im Backend ansehen/herunterladen (Tab „Gutschein-Bild“ mit Vorschau) — neue auth-geschützte Aktion Vouchers::image, ohne öffentlichen Signatur-Link."
1.0.11:
    - "Gutschein-Bild im Hochformat (smartphone-freundlich) statt quer; zentriertes Layout."
    - "Standard-Gültigkeit auf 0 (kein Ablaufdatum) — die alte 3-Jahres-Voreinstellung wird einmalig auf 0 zurückgesetzt, individuelle Werte bleiben erhalten."
    - reset_default_validity_to_none.php
1.0.12:
    - "i18n: Kauf-Formular-Validierung nutzt lokalisierte Feldnamen (z. B. „E-Mail wird benötigt.“ statt „email …“) — übersetzte Attributnamen für firstname/lastname/email/phone/street/zip/city."
1.0.13:
    - "Fix: Einlösungs-Backend-Formular stürzte ab (HTTP 500, „Array to string conversion“), wenn eine Zeile eine MwSt-Aufteilung trug — das jsonable-Array wurde direkt in ein Textfeld gerendert. Das Formular zeigt die Aufteilung jetzt schreibgeschützt und lesbar formatiert (vat_breakdown_text-Accessor)."
1.0.14:
    - "Sicherheit (Produktionsreife): genau ein Gutschein pro bezahlter Bestellung — Ausgabe ist jetzt idempotent über „existiert bereits ein Gutschein“ statt nur über den Status, plus eindeutiger Index auf vouchers.order_id als DB-Schutz."
    - "Sicherheit: Webhook prüft den bezahlten Betrag gegen die Bestellsumme und findet die Bestellung ausschließlich über die gespeicherte payment_id (kein Vertrauen in Mollie-Metadaten)."
    - "Sicherheit: Rate-Limit pro IP auf dem Kauf-Handler (20/min) und Throttle auf allen öffentlichen API-Routen (Webhook, Status, PDF/Bild, Scan)."
    - "Sicherheit/Datenschutz: order-status pollt jetzt per POST (Access-Token nicht mehr in URL/Logs); signierte Download-Links 7 statt 30 Tage gültig."
    - "DSGVO: konfigurierbare IP-Speicherdauer (ip_retention_days, Default 90) + täglich geplanter Befehl jumplink:vouchers-prune-ips, der alte Käufer-IPs löscht."
    - "Härtung: dompdf ohne Remote-/PHP-Ausführung, CSPRNG-Nonce an der Kasse, keine roh durchgereichten Exceptions, Boot-Warnung bei fehlendem VOUCHER_TOKEN_SECRET, neuer Befehl jumplink:vouchers-production-check (Go-Live-Checkliste)."
    - add_unique_order_id_to_vouchers.php
1.0.15:
    - "Kasse: nicht autorisierte Zugriffe auf die Kassen-Handler (Lookup/Einlösen/Verkauf) liefern jetzt sauber HTTP 403 statt 500 — saubereres Monitoring, gleiche Meldung an der Kasse."
