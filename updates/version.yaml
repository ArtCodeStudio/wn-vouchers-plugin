1.0.3:
    - "Zahlung: Zahlungsstatus/-art für manuell angelegte Gutscheine (z. B. an der Kasse bezahlt)."
    - add_payment_to_vouchers.php
1.0.4:
    - "Adresse: optionale Versandadresse für manuell/an der Kasse angelegte Gutscheine (Telefonbestellung mit Versand)."
    - add_address_to_vouchers.php
1.0.5:
    - "Dev/Ops: Command jumplink:vouchers-check-payment (Webhook manuell/lokal auslösen) + webhookUrl nur bei öffentlicher APP_URL setzen (lokaler Mollie-Test ohne Tunnel)."
1.0.6:
    - "UX: Rückkehrseite pollt den Status client-seitig (kein Hard-Reload) via api/jumplink/vouchers/order-status."
1.0.7:
    - "Lieferung: Gutschein als PNG-Bild statt PDF (universell öffenbar, GD-gerendert); PDF bleibt als Fallback."
1.0.8:
    - "i18n: Plugin vollständig zweisprachig (Deutsch + Englisch) — Status, Felder, Einstellungen, Mails, Kassen-/Kauf-UI und Meldungen folgen jetzt der App-Locale."
1.0.9:
    - "i18n: Backend-Listenspalten zeigen übersetzte Labels statt Roh-Codes (Status, Typ, Versand, Zahlung, Einlöseart/-quelle) über *_label-Accessoren; neue Sprachgruppe order_payment_status für die rohen Mollie-Status (open/pending/… inkl. canceled mit einem l) und redemption_source."
1.0.10:
    - "Backend: Gutschein-Bild jedes bestehenden Gutscheins direkt im Backend ansehen/herunterladen (Tab „Gutschein-Bild“ mit Vorschau) — neue auth-geschützte Aktion Vouchers::image, ohne öffentlichen Signatur-Link."
1.0.11:
    - "Gutschein-Bild im Hochformat (smartphone-freundlich) statt quer; zentriertes Layout."
    - "Standard-Gültigkeit auf 0 (kein Ablaufdatum) — die alte 3-Jahres-Voreinstellung wird einmalig auf 0 zurückgesetzt, individuelle Werte bleiben erhalten."
    - reset_default_validity_to_none.php
1.0.12:
    - "i18n: Kauf-Formular-Validierung nutzt lokalisierte Feldnamen (z. B. „E-Mail wird benötigt.“ statt „email …“) — übersetzte Attributnamen für firstname/lastname/email/phone/street/zip/city."
