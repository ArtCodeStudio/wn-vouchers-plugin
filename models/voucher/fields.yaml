fields:
    code:
        label: Code
        span: left
        disabled: true
        comment: 'Wird automatisch aus der Nummer erzeugt.'
    status:
        label: Status
        type: dropdown
        span: right

tabs:
    fields:
        number_source:
            label: Nummernquelle
            tab: Gutschein
            type: dropdown
            span: left
            default: auto
            options:
                auto: 'Automatisch (fortlaufend)'
                manual: 'Manuell (Ordner-Nummer)'
            comment: 'Automatisch = nächste freie Nummer wird vergeben. Manuell = Nummer aus dem Aktenordner eintragen.'
        number:
            label: Nummer
            tab: Gutschein
            type: number
            span: right
            comment: 'Bei „Automatisch“ leer lassen, bei „Manuell“ eintragen.'
        type:
            label: Typ
            tab: Gutschein
            type: dropdown
            span: left
            default: physical
        value_euro:
            label: Wert (€)
            tab: Gutschein
            type: text
            span: right
            comment: 'z. B. 50,00'
        balance_euro:
            label: Restguthaben
            tab: Gutschein
            type: text
            span: left
            disabled: true
            comment: 'Wird aus dem Einlöse-Ledger berechnet.'
        payment_section:
            type: section
            label: Zahlung
            tab: Gutschein
            comment: 'Bei manueller Anlage: ob und wie der Kunde bezahlt hat (z. B. bereits an der normalen Kasse).'
        payment_status:
            label: Zahlungsstatus
            tab: Gutschein
            type: dropdown
            span: left
            default: paid
        payment_method:
            label: Zahlungsart
            tab: Gutschein
            type: dropdown
            span: right
            default: cash
            emptyOption: '— bitte wählen —'
        recipient_name:
            label: Empfänger
            tab: Gutschein
            type: text
            span: right
            comment: 'Vorschläge erscheinen, wenn der Name bereits vergeben wurde.'
        recipient_suggest:
            type: partial
            path: recipient_datalist
            tab: Gutschein
            span: full
        valid_until:
            label: 'Gültig bis (optional)'
            tab: Gutschein
            type: datepicker
            mode: date
            span: left
            comment: 'Leer = Standard-Gültigkeit aus den Einstellungen (Standard: 3 Jahre zum Jahresende). Hier kann ein abweichendes Datum gesetzt werden.'
        issued_at:
            label: Ausgestellt am
            tab: Gutschein
            type: datepicker
            mode: datetime
            span: right
            disabled: true

        redeem:
            type: partial
            path: redeem
            tab: Einlösung
            span: full
            context: [update]
