fields:
    code:
        label: jumplink.vouchers::lang.field.code
        span: left
        disabled: true
        comment: jumplink.vouchers::lang.field.code_comment
    status:
        label: jumplink.vouchers::lang.field.status
        type: dropdown
        span: right

tabs:
    fields:
        number_source:
            label: jumplink.vouchers::lang.field.number_source
            tab: jumplink.vouchers::lang.tab.voucher
            type: dropdown
            span: left
            default: auto
            comment: jumplink.vouchers::lang.field.number_source_comment
        number:
            label: jumplink.vouchers::lang.field.number
            tab: jumplink.vouchers::lang.tab.voucher
            type: number
            span: right
            # Only required for manual numbers (server rule required_if). Set
            # explicitly so the backend form doesn't derive an unconditional
            # "required" from the rule string and mark it required for auto too.
            required: false
            comment: jumplink.vouchers::lang.field.number_comment
        type:
            label: jumplink.vouchers::lang.field.type
            tab: jumplink.vouchers::lang.tab.voucher
            type: dropdown
            span: left
            default: physical
        value_euro:
            label: jumplink.vouchers::lang.field.value_euro
            tab: jumplink.vouchers::lang.tab.voucher
            type: text
            span: right
            comment: jumplink.vouchers::lang.field.value_euro_comment
        balance_euro:
            label: jumplink.vouchers::lang.field.balance
            tab: jumplink.vouchers::lang.tab.voucher
            type: text
            span: left
            disabled: true
            comment: jumplink.vouchers::lang.field.balance_comment
        payment_section:
            type: section
            label: jumplink.vouchers::lang.field.payment
            tab: jumplink.vouchers::lang.tab.voucher
            comment: jumplink.vouchers::lang.field.payment_section_comment
        payment_status:
            label: jumplink.vouchers::lang.field.payment_status
            tab: jumplink.vouchers::lang.tab.voucher
            type: dropdown
            span: left
            default: paid
        payment_method:
            label: jumplink.vouchers::lang.field.payment_method
            tab: jumplink.vouchers::lang.tab.voucher
            type: dropdown
            span: right
            default: cash
            emptyOption: jumplink.vouchers::lang.field.payment_method_empty
        recipient_name:
            label: jumplink.vouchers::lang.field.recipient
            tab: jumplink.vouchers::lang.tab.voucher
            type: text
            span: right
            comment: jumplink.vouchers::lang.field.recipient_comment
        recipient_suggest:
            type: partial
            path: recipient_datalist
            tab: jumplink.vouchers::lang.tab.voucher
            span: full
        address_section:
            type: section
            label: jumplink.vouchers::lang.field.address_section
            tab: jumplink.vouchers::lang.tab.voucher
            comment: jumplink.vouchers::lang.field.address_section_comment
            trigger:
                action: show
                field: type
                condition: value[physical]
        street:
            label: jumplink.vouchers::lang.field.street
            tab: jumplink.vouchers::lang.tab.voucher
            type: text
            span: full
            trigger:
                action: show
                field: type
                condition: value[physical]
        zip:
            label: jumplink.vouchers::lang.field.zip
            tab: jumplink.vouchers::lang.tab.voucher
            type: text
            span: left
            trigger:
                action: show
                field: type
                condition: value[physical]
        city:
            label: jumplink.vouchers::lang.field.city
            tab: jumplink.vouchers::lang.tab.voucher
            type: text
            span: right
            trigger:
                action: show
                field: type
                condition: value[physical]
        valid_until:
            label: jumplink.vouchers::lang.field.valid_until_optional
            tab: jumplink.vouchers::lang.tab.voucher
            type: datepicker
            mode: date
            span: left
            comment: jumplink.vouchers::lang.field.valid_until_comment
        issued_at:
            label: jumplink.vouchers::lang.field.issued_at
            tab: jumplink.vouchers::lang.tab.voucher
            type: datepicker
            mode: datetime
            span: right
            disabled: true

        redeem:
            type: partial
            path: redeem
            tab: jumplink.vouchers::lang.tab.redemption
            span: full
            context: [update]

        voucher_image:
            type: partial
            path: voucher_image
            tab: jumplink.vouchers::lang.tab.image
            span: full
            context: [update]
