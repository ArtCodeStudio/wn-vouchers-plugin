tabs:
    fields:
        #
        # Tab: Gutscheine
        #
        voucher_start_number:
            label: Startnummer (automatisch)
            tab: Gutscheine
            type: number
            span: left
            default: 100000
            comment: 'Ab dieser Nummer werden digitale Gutscheine automatisch nummeriert. Muss über dem handschriftlichen Ordner-Bereich liegen.'
        default_validity_years:
            label: Gültigkeit (Jahre)
            tab: Gutscheine
            type: number
            span: right
            default: 3
            comment: 'Standard-Gültigkeit, gerundet auf das Jahresende — entspricht der gesetzlichen 3-Jahres-Verjährung in DE (§§195/199 BGB). 0 = kein Ablaufdatum drucken.'
        min_value_cents:
            label: Mindestbetrag (Cent)
            tab: Gutscheine
            type: number
            span: left
            default: 1000
        max_value_cents:
            label: Höchstbetrag (Cent)
            tab: Gutscheine
            type: number
            span: right
            default: 50000
        service_fee_cents:
            label: Servicepauschale Versand (Cent)
            tab: Gutscheine
            type: number
            span: left
            default: 250
            comment: 'Wird nur bei physischem Versand berechnet (2,50 €).'
        denominations:
            label: Vorgeschlagene Beträge
            tab: Gutscheine
            type: repeater
            span: full
            prompt: Betrag hinzufügen
            form:
                fields:
                    value_cents:
                        label: Betrag (Cent)
                        type: number

        #
        # Tab: MwSt
        #
        vat_mode:
            label: MwSt-Modell
            tab: MwSt
            type: dropdown
            span: left
            default: multi_purpose
            options:
                multi_purpose: 'Mehrzweckgutschein (MwSt bei Einlösung)'
                single_purpose: 'Einzweckgutschein (MwSt beim Verkauf)'
            comment: 'Mehrzweck = empfohlen für ein Restaurant mit 7%/19%-Einlösungen. Final mit dem Steuerberater abstimmen.'
        vat_rate:
            label: MwSt-Satz Verkauf (%)
            tab: MwSt
            type: number
            span: right
            default: 19
            trigger:
                action: show
                field: vat_mode
                condition: value[single_purpose]
            comment: 'Nur für Einzweckgutschein relevant.'
        vat_rates:
            label: Wählbare Sätze bei Einlösung (%)
            tab: MwSt
            type: repeater
            span: full
            prompt: Satz hinzufügen
            form:
                fields:
                    rate:
                        label: Satz (%)
                        type: number

        #
        # Tab: Zahlung
        #
        mollie_mode:
            label: Mollie-Modus
            tab: Zahlung
            type: dropdown
            span: left
            default: test
            options:
                test: Test
                live: Live
            comment: 'Der API-Key wird aus der .env (MOLLIE_API_KEY) gelesen, nie hier gespeichert.'
        pos_page_url:
            label: Kassen-Seite (URL-Pfad)
            tab: Zahlung
            type: text
            span: right
            default: /kasse/gutschein
            comment: 'CMS-Seite mit der Komponente „Gutschein-Kasse". Der QR-Code-Scan leitet hierher.'

        #
        # Tab: Benachrichtigung
        #
        notify_name:
            label: Standard-Empfänger Name
            tab: Benachrichtigung
            type: text
            span: left
        notify_email:
            label: Standard-Empfänger E-Mail
            tab: Benachrichtigung
            type: text
            span: right
            comment: 'Empfänger für Bestell-/Versandbenachrichtigungen.'
        send_customer_copy:
            label: Bestätigung an Käufer senden
            tab: Benachrichtigung
            type: switch
            default: true
        sender_name:
            label: Absender-Name
            tab: Benachrichtigung
            type: text
            span: left
        sender_email:
            label: Absender-E-Mail
            tab: Benachrichtigung
            type: text
            span: right
            comment: 'Leer lassen, um den globalen Mail-Absender zu verwenden.'

        #
        # Tab: Gutschein-Design
        #
        brand_name:
            label: Markenname
            tab: Gutschein-Design
            type: text
            span: left
            comment: 'Erscheint auf dem Gutschein und in den E-Mails.'
        pdf_accent_color:
            label: Akzentfarbe
            tab: Gutschein-Design
            type: colorpicker
            span: right
            default: '#1a3a5a'
        pdf_logo:
            label: Logo (optional)
            tab: Gutschein-Design
            type: fileupload
            mode: image
            imageHeight: 60
            span: left
            comment: 'Wird oben auf dem Gutschein angezeigt.'
        pdf_background:
            label: Briefpapier / Hintergrund (optional)
            tab: Gutschein-Design
            type: fileupload
            mode: image
            span: right
            comment: 'Vollflächiges Hintergrundbild für ein individuelles Gutschein-Design (Kartenformat quer). Die Gutschein-Daten werden darübergelegt.'
        pdf_footer_text:
            label: Fußzeile / rechtlicher Hinweis
            tab: Gutschein-Design
            type: textarea
            span: full
            size: small
