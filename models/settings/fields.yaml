tabs:
    fields:
        #
        # Tab: Vouchers
        #
        voucher_start_number:
            label: jumplink.vouchers::lang.setting.start_number
            tab: jumplink.vouchers::lang.setting_tab.vouchers
            type: number
            span: left
            default: 100000
            comment: jumplink.vouchers::lang.setting.start_number_comment
        default_validity_years:
            label: jumplink.vouchers::lang.setting.validity_years
            tab: jumplink.vouchers::lang.setting_tab.vouchers
            type: number
            span: right
            default: 0
            comment: jumplink.vouchers::lang.setting.validity_years_comment
        min_value_cents:
            label: jumplink.vouchers::lang.setting.min_value
            tab: jumplink.vouchers::lang.setting_tab.vouchers
            type: number
            span: left
            default: 1000
        max_value_cents:
            label: jumplink.vouchers::lang.setting.max_value
            tab: jumplink.vouchers::lang.setting_tab.vouchers
            type: number
            span: right
            default: 50000
        service_fee_cents:
            label: jumplink.vouchers::lang.setting.service_fee
            tab: jumplink.vouchers::lang.setting_tab.vouchers
            type: number
            span: left
            default: 250
            comment: jumplink.vouchers::lang.setting.service_fee_comment
        denominations:
            label: jumplink.vouchers::lang.setting.denominations
            tab: jumplink.vouchers::lang.setting_tab.vouchers
            type: repeater
            span: full
            prompt: jumplink.vouchers::lang.setting.denominations_prompt
            form:
                fields:
                    value_cents:
                        label: jumplink.vouchers::lang.setting.amount_cents
                        type: number
                        span: left
                    label:
                        label: jumplink.vouchers::lang.setting.amount_label
                        type: text
                        span: right
                        comment: jumplink.vouchers::lang.setting.amount_label_comment

        #
        # Tab: VAT
        #
        vat_mode:
            label: jumplink.vouchers::lang.field.vat_mode
            tab: jumplink.vouchers::lang.setting_tab.vat
            type: dropdown
            span: left
            default: multi_purpose
            comment: jumplink.vouchers::lang.setting.vat_mode_comment
        vat_rate:
            label: jumplink.vouchers::lang.setting.vat_rate
            tab: jumplink.vouchers::lang.setting_tab.vat
            type: number
            span: right
            default: 19
            trigger:
                action: show
                field: vat_mode
                condition: value[single_purpose]
            comment: jumplink.vouchers::lang.setting.vat_rate_comment

        #
        # Tab: Receipt (Beleg)
        #
        seller_legal_name:
            label: jumplink.vouchers::lang.setting.seller_legal_name
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: left
            comment: jumplink.vouchers::lang.setting.seller_legal_name_comment
        seller_tax_number:
            label: jumplink.vouchers::lang.setting.seller_tax_number
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: right
            comment: jumplink.vouchers::lang.setting.seller_tax_number_comment
        seller_address:
            label: jumplink.vouchers::lang.setting.seller_address
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: textarea
            size: small
            span: full
            comment: jumplink.vouchers::lang.setting.seller_address_comment
        receipt_section:
            type: section
            label: jumplink.vouchers::lang.setting.receipt_section
            comment: jumplink.vouchers::lang.setting.receipt_section_comment
            tab: jumplink.vouchers::lang.setting_tab.receipt
        send_buyer_receipt:
            label: jumplink.vouchers::lang.setting.send_buyer_receipt
            comment: jumplink.vouchers::lang.setting.send_buyer_receipt_comment
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: switch
            default: true
            span: left
        accounting_copy_email:
            label: jumplink.vouchers::lang.setting.accounting_copy_email
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: right
            comment: jumplink.vouchers::lang.setting.accounting_copy_email_comment
        receipt_note:
            label: jumplink.vouchers::lang.setting.receipt_note
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: textarea
            size: small
            span: full
            comment: jumplink.vouchers::lang.setting.receipt_note_comment
        datev_section:
            type: section
            label: jumplink.vouchers::lang.setting.datev_section
            comment: jumplink.vouchers::lang.setting.datev_section_comment
            tab: jumplink.vouchers::lang.setting_tab.receipt
        datev_consultant_number:
            label: jumplink.vouchers::lang.setting.datev_consultant_number
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: left
            comment: jumplink.vouchers::lang.setting.datev_consultant_number_comment
        datev_client_number:
            label: jumplink.vouchers::lang.setting.datev_client_number
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: right
            comment: jumplink.vouchers::lang.setting.datev_client_number_comment
        datev_money_account:
            label: jumplink.vouchers::lang.setting.datev_money_account
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: left
            comment: jumplink.vouchers::lang.setting.datev_money_account_comment
        datev_voucher_liability_account:
            label: jumplink.vouchers::lang.setting.datev_voucher_liability_account
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: right
            comment: jumplink.vouchers::lang.setting.datev_voucher_liability_account_comment
        datev_shipping_revenue_account:
            label: jumplink.vouchers::lang.setting.datev_shipping_revenue_account
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: left
            comment: jumplink.vouchers::lang.setting.datev_shipping_revenue_account_comment
        datev_shipping_vat_key:
            label: jumplink.vouchers::lang.setting.datev_shipping_vat_key
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: text
            span: right
            comment: jumplink.vouchers::lang.setting.datev_shipping_vat_key_comment
        datev_account_length:
            label: jumplink.vouchers::lang.setting.datev_account_length
            tab: jumplink.vouchers::lang.setting_tab.receipt
            type: number
            span: left
            default: 4
            comment: jumplink.vouchers::lang.setting.datev_account_length_comment

        #
        # Tab: Payment
        #
        payment_mode:
            label: jumplink.vouchers::lang.setting.payment_mode
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: dropdown
            span: left
            default: both
            comment: jumplink.vouchers::lang.setting.payment_mode_comment
        bank_account_holder:
            label: jumplink.vouchers::lang.setting.bank_account_holder
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: text
            span: left
            comment: jumplink.vouchers::lang.setting.bank_details_comment
        bank_iban:
            label: jumplink.vouchers::lang.setting.bank_iban
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: text
            span: right
        bank_bic:
            label: jumplink.vouchers::lang.setting.bank_bic
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: text
            span: left
        bank_name:
            label: jumplink.vouchers::lang.setting.bank_name
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: text
            span: right
        bank_transfer_note:
            label: jumplink.vouchers::lang.setting.bank_transfer_note
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: textarea
            size: small
            span: full
            comment: jumplink.vouchers::lang.setting.bank_transfer_note_comment
        pos_page_url:
            label: jumplink.vouchers::lang.setting.pos_page_url
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: text
            span: right
            default: /kasse/gutschein
            comment: jumplink.vouchers::lang.setting.pos_page_url_comment
        ip_retention_days:
            label: jumplink.vouchers::lang.setting.ip_retention_days
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: number
            span: left
            default: 90
            comment: jumplink.vouchers::lang.setting.ip_retention_days_comment
        personal_data_retention_days:
            label: jumplink.vouchers::lang.setting.personal_data_retention_days
            tab: jumplink.vouchers::lang.setting_tab.payment
            type: number
            span: right
            default: 0
            comment: jumplink.vouchers::lang.setting.personal_data_retention_days_comment

        #
        # Tab: Notification
        #
        notify_name:
            label: jumplink.vouchers::lang.setting.notify_name
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: text
            span: left
        notify_email:
            label: jumplink.vouchers::lang.setting.notify_email
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: text
            span: right
            comment: jumplink.vouchers::lang.setting.notify_email_comment
        emails_team_section:
            type: section
            label: jumplink.vouchers::lang.setting.emails_team_section
            comment: jumplink.vouchers::lang.setting.emails_team_section_comment
            tab: jumplink.vouchers::lang.setting_tab.notification
        notify_new_order:
            label: jumplink.vouchers::lang.setting.notify_new_order
            comment: jumplink.vouchers::lang.setting.notify_new_order_comment
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: switch
            default: true
            span: left
        notify_fulfillment:
            label: jumplink.vouchers::lang.setting.notify_fulfillment
            comment: jumplink.vouchers::lang.setting.notify_fulfillment_comment
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: switch
            default: true
            span: right
        notify_bank_transfer:
            label: jumplink.vouchers::lang.setting.notify_bank_transfer
            comment: jumplink.vouchers::lang.setting.notify_bank_transfer_comment
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: switch
            default: true
            span: left
        emails_buyer_section:
            type: section
            label: jumplink.vouchers::lang.setting.emails_buyer_section
            comment: jumplink.vouchers::lang.setting.emails_buyer_section_comment
            tab: jumplink.vouchers::lang.setting_tab.notification
        send_buyer_confirmation:
            label: jumplink.vouchers::lang.setting.send_buyer_confirmation
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: switch
            default: true
            span: left
        send_buyer_bank_transfer:
            label: jumplink.vouchers::lang.setting.send_buyer_bank_transfer
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: switch
            default: true
            span: right
        send_buyer_shipping:
            label: jumplink.vouchers::lang.setting.send_buyer_shipping
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: switch
            default: true
            span: left
        sender_name:
            label: jumplink.vouchers::lang.setting.sender_name
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: text
            span: left
        sender_email:
            label: jumplink.vouchers::lang.setting.sender_email
            tab: jumplink.vouchers::lang.setting_tab.notification
            type: text
            span: right
            comment: jumplink.vouchers::lang.setting.sender_email_comment

        #
        # Tab: Voucher design
        #
        brand_name:
            label: jumplink.vouchers::lang.setting.brand_name
            tab: jumplink.vouchers::lang.setting_tab.design
            type: text
            span: left
            comment: jumplink.vouchers::lang.setting.brand_name_comment
        pdf_accent_color:
            label: jumplink.vouchers::lang.setting.accent_color
            tab: jumplink.vouchers::lang.setting_tab.design
            type: colorpicker
            span: right
            default: '#1a3a5a'
        pdf_logo:
            label: jumplink.vouchers::lang.setting.logo
            tab: jumplink.vouchers::lang.setting_tab.design
            type: fileupload
            mode: image
            imageHeight: 60
            span: left
            comment: jumplink.vouchers::lang.setting.logo_comment
        pdf_background:
            label: jumplink.vouchers::lang.setting.background
            tab: jumplink.vouchers::lang.setting_tab.design
            type: fileupload
            mode: image
            span: right
            comment: jumplink.vouchers::lang.setting.background_comment
        pdf_footer_text:
            label: jumplink.vouchers::lang.setting.footer_text
            tab: jumplink.vouchers::lang.setting_tab.design
            type: textarea
            span: full
            size: small
